<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix — AI XR Companion</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: #eee; }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2000;
            transition: transform 0.2s, background 0.2s;
        }
        #crosshair.active {
            transform: translate(-50%, -50%) scale(2);
            background: rgba(0, 255, 255, 0.8);
        }

        /* Progress Circle */
        #gaze-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%) rotate(-90deg);
            pointer-events: none;
            z-index: 1999;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #gaze-progress circle {
            fill: none;
            stroke: #00ffff;
            stroke-width: 4;
            stroke-dasharray: 113; /* 2 * PI * 18 */
            stroke-dashoffset: 113;
        }

        /* Intro Popup */
        #intro-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            text-align: center;
            z-index: 3000;
            max-width: 300px;
            display: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        #intro-popup h2 { margin-top: 0; color: #00ffff; }
        #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <svg id="gaze-progress">
        <circle cx="20" cy="20" r="18"></circle>
    </svg>

    <div id="intro-popup">
        <div id="close-btn" data-interactive="true" data-action="close-popup">X</div>
        <h2>Orbix</h2>
        <p>This experience uses simulated XR due to hardware limitations.</p>
        <p style="font-size: 12px; opacity: 0.7;">Gaze at 'X' to close.</p>
    </div>

    <div id="overlay"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
