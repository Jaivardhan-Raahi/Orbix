<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix — AI AR Companion</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Landing UI */
        #landing-ui {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #111, #222);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }
        #landing-ui h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        #landing-ui p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.8; }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,255,0.4);
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }

        /* Scene Fade-in */
        #fade-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 4000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
        }
        
        /* AR Overlay Container */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="landing-ui">
        <h1>Orbix VR</h1>
        <p>Interactive AI Companion</p>
        <button id="start-ar-btn">Start VR Session</button>
    </div>

    <!-- Mobile Debug Console -->
    <div id="debug-console" style="
        position: fixed; 
        bottom: 10px; 
        left: 10px; 
        right: 10px; 
        height: 150px; 
        background: rgba(0,0,0,0.7); 
        color: #00ff00; 
        font-family: monospace; 
        font-size: 10px; 
        overflow-y: auto; 
        z-index: 9999; 
        pointer-events: none; 
        padding: 5px;
        border: 1px solid #333;
        display: none;
    "></div>

    <div id="fade-overlay"></div>
    <div id="overlay"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
